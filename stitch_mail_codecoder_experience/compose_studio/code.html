        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #353535;
            border-radius: 4px;
        }

<body class="bg-background text-on-background min-h-screen font-body-md antialiased overflow-hidden flex">
<!-- SideNavBar (Suppressed as this is a focused Compose studio, acting like a fullscreen modal/overlay over the main app, but we include a collapsed minimal version to hint at the overarching structure if needed. For true focus, we omit it or keep it highly minimized. Let's omit full SideNav to prioritize Canvas per instructions for task-focused screens with "Close".) -->
<!-- Main Canvas Area -->
<main class="flex-1 flex flex-col h-screen relative bg-surface-container-lowest/50 backdrop-blur-3xl">
<!-- Minimal Top Bar for Compose Studio -->
<header class="flex justify-between items-center px-margin-safe h-24 max-w-desktop-max-width mx-auto w-full flex-shrink-0 border-b border-outline-variant/10">
<div class="flex items-center gap-4 text-on-surface-variant hover:text-on-surface transition-colors duration-300 cursor-pointer group">
<span class="material-symbols-outlined group-hover:-translate-x-1 transition-transform duration-300">arrow_back</span>
<span class="font-label-caps text-label-caps tracking-widest uppercase">Discard Draft</span>
</div>
<div class="font-headline-md text-headline-md tracking-tighter text-on-surface uppercase opacity-50">
                MAIL CODECODER
            </div>
<div class="flex items-center gap-6">
<button class="text-on-surface-variant hover:text-secondary transition-colors duration-300 flex items-center gap-2">
<span class="material-symbols-outlined">save</span>
<span class="font-label-caps text-label-caps">Save</span>
</button>
<button class="bg-surface-container text-on-surface border border-outline-variant/30 hover:border-secondary hover:text-secondary px-6 py-2 rounded-DEFAULT font-label-caps text-label-caps transition-all duration-500 flex items-center gap-2">
<span>Send</span>
<span class="material-symbols-outlined text-[18px]">send</span>
</button>
</div>
</header>
<!-- Compose Studio Container -->
<div class="flex-1 overflow-y-auto w-full max-w-4xl mx-auto px-margin-safe py-12 flex flex-col relative">
<!-- Metadata Area (To, CC, Subject) -->
<div class="space-y-8 mb-12 relative z-10">
<!-- To Field -->
<div class="group border-b border-outline-variant/20 hover:border-outline-variant/60 focus-within:border-primary transition-colors duration-300 pb-2 flex items-center gap-4">
<label class="font-label-caps text-label-caps text-on-surface-variant w-16 uppercase">To</label>
<div class="flex-1 flex flex-wrap gap-2 items-center">
<!-- Chip -->
<div class="bg-surface-container border border-outline-variant/20 px-3 py-1 rounded-full flex items-center gap-2 text-secondary">
<img alt="Avatar" class="w-5 h-5 rounded-full grayscale opacity-80" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC_7NRrUE0NJ1LAp2FECK7bua-utt-HS0ciyaq13b0nMw6Mvj6zlWswZIlzAndSMxC-sjN5jxe8BsziXo7JGN4Bq0XaLk5KXODG6N8okp89ZS7hoTHcYe8-co-i2AuQw-qI8YNMPZCGqrhS-npBIZ4CRITSGvgBw5S5fN-ROMQBs1vE6iGbUigZLS02dGoquwb1_-gPu-fFMoyaXCrkLKjt3_hpAiIqHC6ggWxwHOFEBUpjzfQQtBGMNr6zk2PHg_QgO1PR9gaSx2zA"/>
<span class="font-body-md text-[14px]">elena.vance@studio.co</span>
<span class="material-symbols-outlined text-[14px] cursor-pointer hover:text-on-surface">close</span>
</div>
<input class="bg-transparent border-none focus:ring-0 text-body-md text-on-surface placeholder-on-surface-variant/30 flex-1 min-w-[200px]" placeholder="Add recipient..." type="text"/>
</div>
<div class="flex gap-4 text-on-surface-variant/50 font-label-caps text-label-caps">
<button class="hover:text-on-surface transition-colors">Cc</button>
<button class="hover:text-on-surface transition-colors">Bcc</button>
</div>
</div>
<!-- Subject Field -->
<div class="group border-b border-transparent focus-within:border-outline-variant/20 transition-colors duration-300 pb-2">
<input class="w-full bg-transparent border-none focus:ring-0 font-headline-lg text-headline-lg text-on-surface placeholder-on-surface-variant/20 tracking-tight" placeholder="Subject" type="text"/>
</div>
</div>
<!-- Editor Toolbar (Floating) -->
<div class="sticky top-0 z-20 bg-surface-container/90 backdrop-blur-xl border border-outline-variant/20 rounded-lg p-2 mb-8 flex items-center gap-2 shadow-[0_20px_40px_-10px_rgba(0,0,0,0.8)] mx-auto w-max">
<button class="w-8 h-8 rounded flex items-center justify-center text-on-surface-variant hover:bg-surface-bright hover:text-on-surface transition-colors"><span class="material-symbols-outlined text-[18px]">format_bold</span></button>
<button class="w-8 h-8 rounded flex items-center justify-center text-on-surface-variant hover:bg-surface-bright hover:text-on-surface transition-colors"><span class="material-symbols-outlined text-[18px]">format_italic</span></button>
<button class="w-8 h-8 rounded flex items-center justify-center text-on-surface-variant hover:bg-surface-bright hover:text-on-surface transition-colors"><span class="material-symbols-outlined text-[18px]">format_underlined</span></button>
<div class="w-px h-4 bg-outline-variant/30 mx-2"></div>
<button class="w-8 h-8 rounded flex items-center justify-center text-on-surface-variant hover:bg-surface-bright hover:text-on-surface transition-colors"><span class="material-symbols-outlined text-[18px]">format_align_left</span></button>
<button class="w-8 h-8 rounded flex items-center justify-center text-on-surface-variant hover:bg-surface-bright hover:text-on-surface transition-colors"><span class="material-symbols-outlined text-[18px]">format_align_center</span></button>
<div class="w-px h-4 bg-outline-variant/30 mx-2"></div>
<button class="w-8 h-8 rounded flex items-center justify-center text-on-surface-variant hover:bg-surface-bright hover:text-on-surface transition-colors"><span class="material-symbols-outlined text-[18px]">format_list_bulleted</span></button>
<button class="w-8 h-8 rounded flex items-center justify-center text-on-surface-variant hover:bg-surface-bright hover:text-on-surface transition-colors"><span class="material-symbols-outlined text-[18px]">link</span></button>
<button class="w-8 h-8 rounded flex items-center justify-center text-on-surface-variant hover:bg-surface-bright hover:text-on-surface transition-colors"><span class="material-symbols-outlined text-[18px]">attach_file</span></button>
</div>
<!-- Main Editor Area -->
<div class="flex-1 relative z-10">
<textarea class="w-full h-full min-h-[400px] bg-transparent border-none focus:ring-0 font-body-lg text-body-lg text-on-surface placeholder-on-surface-variant/30 resize-none leading-relaxed" placeholder="Begin drafting..."></textarea>
</div>
<!-- Attachments Area (Minimalist) -->
<div class="mt-8 border-t border-outline-variant/10 pt-6">
<div class="font-label-caps text-label-caps text-on-surface-variant mb-4 uppercase">Attachments</div>
<div class="flex gap-4">
<!-- Placeholder Attachment -->
<div class="group flex items-center gap-3 bg-surface border border-outline-variant/20 rounded-DEFAULT p-3 hover:bg-surface-container transition-colors duration-300 w-64 cursor-pointer">
<div class="w-10 h-10 bg-surface-container-high rounded flex items-center justify-center text-secondary">
<span class="material-symbols-outlined text-[20px]">picture_as_pdf</span>
</div>
<div class="flex-1 overflow-hidden">
<div class="font-body-md text-[14px] text-on-surface truncate">Q3_Strategy_Deck.pdf</div>
<div class="font-label-caps text-[10px] text-on-surface-variant mt-1">2.4 MB</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant/50 group-hover:text-error transition-colors text-[18px]">close</span>
</div>
<!-- Upload Dropzone Hint -->
<div class="flex items-center justify-center border border-dashed border-outline-variant/30 rounded-DEFAULT w-64 text-on-surface-variant/50 hover:border-secondary hover:text-secondary transition-colors duration-300 cursor-pointer">
<div class="flex items-center gap-2 font-label-caps text-label-caps">
<span class="material-symbols-outlined text-[18px]">add</span>
<span>Add File</span>
</div>
</div>
</div>
</div>
</div>
</main>
<!-- Introductory Animation Overlay (Simulates entering the studio) -->
<div class="fixed inset-0 bg-surface-container-lowest z-50 flex items-center justify-center pointer-events-none transition-opacity duration-1000" id="studio-overlay">
<div class="w-0 h-[1px] bg-secondary transition-all duration-700 ease-out" id="loading-line"></div>
</div>
<script>
        // Simple entrance animation script
        document.addEventListener("DOMContentLoaded", () => {
            const overlay = document.getElementById('studio-overlay');
            const line = document.getElementById('loading-line');
            
            setTimeout(() => {
                line.style.width = '200px';
                
                setTimeout(() => {
                    overlay.style.opacity = '0';
                    setTimeout(() => {
                        overlay.remove();
                    }, 1000);
                }, 400);
            }, 100);
        });
    </script>
</body></html>
